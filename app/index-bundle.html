<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
<title>Blockshare</title>

<!--
  app.blockshare.ca — the cohesive Blockshare web app.
  Served from /app/ (BlockShare Static Pages). Sign-up at /signup.html feeds in.

  API base resolves from (in order): ?api= → window.BS_CONFIG.apiBase →
  this meta tag → '/wp-json/blockshare/v1'.
  Add ?mocks=1 to force the bundled sample data (useful for demos / offline).
-->
<meta name="bs-api-base" content="/wp-json/blockshare/v1"/>
<!-- DEMO MODE: set content="1" to explore with sample data and no sign-in.
     Set to "0" (or delete this line) for production so the real auth guard + API take over. -->
<meta name="bs-demo" content="1"/>
<meta name="theme-color" content="#FAF6F0"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..700,0..100,0..1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* ===========================================================================
   Blockshare app — design system
   Single source of truth for tokens + shared component classes.
   Mirrors the HOOD direction from the prototype (terracotta + sage, Fraunces).
   =========================================================================== */

:root {
  /* Surfaces */
  --bg:           #FAF6F0;
  --cream:        #F3EFE6;
  --surface:      #FFFFFF;
  --surface-2:    #FBF8F2;

  /* Ink */
  --ink:          #24231F;
  --ink-soft:     #6A6760;
  --ink-faint:    #9A9384;

  /* Lines */
  --line:         #EEE6D8;
  --line-strong:  #E2D8C6;

  /* Brand */
  --primary:      #D35831;   /* terracotta */
  --primary-deep: #B1451F;
  --primary-wash: #FFF0E2;
  --accent:       #3E6B5C;   /* sage */
  --accent-deep:  #2F5246;
  --accent-wash:  #E6EEE9;

  /* Section accents (match the 4 tabs) */
  --home:   #3E6B5C;
  --stuff:  #D35831;
  --food:   #B23A48;
  --me:     #C77D33;

  /* Status */
  --ok:     #3E6B5C;
  --warn:   #B1451F;
  --info:   #3D6A8A;

  /* Radii */
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 26px;
  --r-pill: 999px;

  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(40,30,10,0.05);
  --shadow-md: 0 4px 14px -4px rgba(40,30,10,0.12);
  --shadow-lg: 0 20px 50px -20px rgba(40,30,10,0.22);

  /* Type */
  --sans:    "Plus Jakarta Sans", -apple-system, system-ui, sans-serif;
  --display: "Fraunces", "Plus Jakarta Sans", Georgia, serif;
  --mono:    "JetBrains Mono", ui-monospace, monospace;

  /* App frame */
  --app-max: 460px;
  --tabbar-h: 76px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* On desktop, frame the app as a centered mobile column on a soft backdrop. */
body.bs-body {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  justify-content: center;
  background:
    radial-gradient(900px 600px at 80% -10%, #FCEBDD 0%, transparent 55%),
    radial-gradient(800px 600px at -10% 110%, #E6EEE9 0%, transparent 55%),
    var(--bg);
}

#bs-root {
  width: 100%;
  max-width: var(--app-max);
  min-height: 100vh;
  min-height: 100svh;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 0 1px var(--line), 0 30px 80px -40px rgba(40,30,10,0.3);
}
@media (max-width: 480px) {
  #bs-root { box-shadow: none; }
}

/* ─── Type helpers ───────────────────────────────────────────── */
.bs-display { font-family: var(--display); font-weight: 500; letter-spacing: -0.025em; line-height: 1.04; font-variation-settings: "SOFT" 50, "WONK" 1; }
.bs-kicker  { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
.bs-mono    { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.bs-soft    { color: var(--ink-soft); }

/* ─── Screen scaffold ────────────────────────────────────────── */
.bs-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.bs-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--tabbar-h) + var(--safe-bottom) + 16px);
}
.bs-scroll.no-tabbar { padding-bottom: calc(var(--safe-bottom) + 24px); }

/* App header (per screen) */
.bs-appbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px 14px;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: saturate(1.4) blur(12px);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}
.bs-appbar.scrolled { border-bottom-color: var(--line); }
.bs-appbar h1 { font-size: 20px; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
.bs-appbar .spacer { flex: 1; }

.bs-iconbtn {
  width: 40px; height: 40px;
  border-radius: var(--r-pill);
  border: 1px solid var(--line);
  background: var(--surface);
  display: grid; place-items: center;
  cursor: pointer;
  color: var(--ink);
  flex-shrink: 0;
  transition: background 0.15s, transform 0.06s;
}
.bs-iconbtn:hover { background: var(--cream); }
.bs-iconbtn:active { transform: scale(0.94); }

/* ─── Cards ──────────────────────────────────────────────────── */
.bs-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
}
.bs-card.pad { padding: 18px; }

/* ─── Buttons ────────────────────────────────────────────────── */
.bs-btn {
  appearance: none;
  border: 0;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 16px;
  border-radius: var(--r-md);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.06s, background 0.15s, opacity 0.15s;
  text-decoration: none;
}
.bs-btn:active { transform: translateY(1px); }
.bs-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.bs-btn-lg { height: 56px; padding: 0 22px; }
.bs-btn-md { height: 46px; padding: 0 18px; font-size: 15px; }
.bs-btn-sm { height: 38px; padding: 0 14px; font-size: 14px; border-radius: var(--r-sm); }
.bs-btn-block { width: 100%; }

.bs-btn-primary { background: var(--primary); color: #fff; box-shadow: 0 6px 18px rgba(211,88,49,0.3); }
.bs-btn-primary:hover { background: var(--primary-deep); }
.bs-btn-accent  { background: var(--accent); color: #fff; box-shadow: 0 6px 18px rgba(62,107,92,0.28); }
.bs-btn-accent:hover { background: var(--accent-deep); }
.bs-btn-ghost   { background: var(--surface); color: var(--ink); border: 1px solid var(--line-strong); }
.bs-btn-ghost:hover { background: var(--cream); }
.bs-btn-quiet   { background: transparent; color: var(--ink); }

/* ─── Chips / pills ──────────────────────────────────────────── */
.bs-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 13px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.bs-chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.bs-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: var(--r-pill);
  font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
}
.bs-badge-ok    { background: var(--accent-wash); color: var(--accent-deep); }
.bs-badge-warn  { background: var(--primary-wash); color: var(--primary-deep); }
.bs-badge-muted { background: var(--cream); color: var(--ink-soft); }

/* ─── Photo placeholder (no real images yet) ─────────────────── */
.bs-photo {
  background:
    repeating-linear-gradient(135deg, var(--cream) 0 10px, var(--surface-2) 10px 20px);
  display: grid; place-items: center;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
}

/* ─── Tab bar ────────────────────────────────────────────────── */
.bs-tabbar {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: calc(var(--tabbar-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter: saturate(1.4) blur(16px);
  -webkit-backdrop-filter: saturate(1.4) blur(16px);
  border-top: 1px solid var(--line);
  z-index: 40;
}
.bs-tab {
  appearance: none; border: 0; background: transparent;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; cursor: pointer; padding: 8px 0 6px;
  color: var(--ink-faint);
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  transition: color 0.15s;
}
.bs-tab.on { color: var(--primary); }
.bs-tab svg { display: block; }
.bs-tab .pip {
  position: absolute; top: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--primary); transform: translateX(14px);
}

/* ─── Forms ──────────────────────────────────────────────────── */
.bs-input {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px 16px;
  font-family: var(--sans); font-size: 16px; color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.bs-input:focus { border-color: var(--primary); }
.bs-input::placeholder { color: var(--ink-faint); }

/* ─── Misc ───────────────────────────────────────────────────── */
.bs-divider { height: 1px; background: var(--line); border: 0; margin: 18px 0; }
.bs-row { display: flex; align-items: center; gap: 12px; }
.bs-stack { display: flex; flex-direction: column; }

.bs-avatar {
  border-radius: 50%;
  background: var(--accent-wash);
  color: var(--accent-deep);
  display: grid; place-items: center;
  font-weight: 700;
  flex-shrink: 0;
  overflow: hidden;
}
.bs-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ─── Spinner / skeleton ─────────────────────────────────────── */
.bs-spinner {
  width: 22px; height: 22px;
  border: 2.5px solid var(--line-strong);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: bs-spin 0.7s linear infinite;
}
@keyframes bs-spin { to { transform: rotate(360deg); } }

.bs-skel {
  background: linear-gradient(90deg, var(--cream) 25%, var(--surface-2) 37%, var(--cream) 63%);
  background-size: 400% 100%;
  animation: bs-shimmer 1.4s ease infinite;
  border-radius: var(--r-md);
}
@keyframes bs-shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

.bs-center-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  padding: 40px; text-align: center;
}

/* Screen enter animation */
.bs-enter { animation: bs-rise 0.26s ease-out; }
@keyframes bs-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* Toast */
.bs-toast-wrap {
  position: absolute; left: 0; right: 0; bottom: calc(var(--tabbar-h) + 18px);
  display: flex; justify-content: center; z-index: 60; pointer-events: none;
}
.bs-toast {
  background: var(--ink); color: var(--bg);
  padding: 12px 18px; border-radius: var(--r-pill);
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: bs-rise 0.2s ease-out;
  max-width: 86%;
}
</style>

<template id="__bundler_thumbnail" data-bg-color="#3E6B5C">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

</head>
<body class="bs-body">

<div id="bs-root">
  <!-- Splash while React boots -->
  <div class="bs-center-screen" id="bs-splash">
    <div class="bs-spinner"></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Store loads first (plain JS, defines window.BS) -->
<script>
/* ===========================================================================
   Blockshare — shared store + API client  (window.BS)
   ---------------------------------------------------------------------------
   The single spine the whole app talks to. Responsibilities:
     • Session: read/write JWT + cached user in localStorage.
     • API: fetch wrapper that attaches the Bearer token and parses errors.
     • Graceful fallback: endpoints that don't exist yet (404 / network)
       fall back to bundled mock data, so the front-end is fully buildable
       before the PHP lands. Each screen "goes live" the moment its endpoint
       ships — no front-end change required.
     • Tiny pub/sub so screens re-render when the user object changes
       (e.g. credit balance after a borrow).

   Config (override on window.BS_CONFIG before this script loads, or via
   <meta name="bs-api-base">, or ?api= / ?mocks= in the URL):
     apiBase   string   default '/wp-json/blockshare/v1'
     forceMock bool     default false  — ignore the network, always use mocks
   =========================================================================== */
(function () {
  'use strict';

  var params = new URLSearchParams(location.search);
  var metaBase = document.querySelector('meta[name="bs-api-base"]');
  var cfg = window.BS_CONFIG || {};

  var API_BASE = (
    params.get('api') ||
    cfg.apiBase ||
    (metaBase && metaBase.content) ||
    '/wp-json/blockshare/v1'
  ).replace(/\/$/, '');

  var FORCE_MOCK =
    params.get('mocks') === '1' ||
    cfg.forceMock === true ||
    (document.querySelector('meta[name="bs-demo"]') || {}).content === '1' ||
    (function () { try { return localStorage.getItem('bs_demo') === '1'; } catch (e) { return false; } })();

  var TOKEN_KEY = 'bs_token';
  var USER_KEY  = 'bs_user';
  var SIGNUP_URL = cfg.signupUrl || '/signup.html';

  // ── Session ──────────────────────────────────────────────────
  function getToken() {
    try { return localStorage.getItem(TOKEN_KEY) || ''; } catch (e) { return ''; }
  }
  function setSession(token, user) {
    try {
      if (token) localStorage.setItem(TOKEN_KEY, token);
      if (user)  localStorage.setItem(USER_KEY, JSON.stringify(user));
    } catch (e) {}
    if (user) { _user = user; emit(); }
  }
  function getCachedUser() {
    try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); } catch (e) { return null; }
  }
  function clearSession() {
    try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY); } catch (e) {}
    _user = null; emit();
  }

  // ── Pub/sub ──────────────────────────────────────────────────
  var _user = getCachedUser();
  var _subs = [];
  function subscribe(fn) { _subs.push(fn); return function () { _subs = _subs.filter(function (s) { return s !== fn; }); }; }
  function emit() { _subs.forEach(function (fn) { try { fn(_user); } catch (e) {} }); }

  // ── Core fetch ───────────────────────────────────────────────
  // Returns { ok, status, data } and NEVER throws on HTTP errors — callers
  // decide whether to fall back to mocks. Network failures resolve with
  // ok:false, status:0 so the same fallback path is taken offline.
  function raw(path, opts) {
    opts = opts || {};
    var headers = { 'Content-Type': 'application/json' };
    var token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return fetch(API_BASE + path, {
      method: opts.method || 'GET',
      headers: headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    }).then(function (res) {
      return res.json().catch(function () { return null; }).then(function (data) {
        return { ok: res.ok, status: res.status, data: data };
      });
    }).catch(function () {
      return { ok: false, status: 0, data: null };
    });
  }

  // Strict call — throws on error. Use for real writes where we must surface
  // the failure to the user (e.g. borrow, sign-in).
  function api(path, opts) {
    return raw(path, opts).then(function (r) {
      if (!r.ok) {
        if (r.status === 401) clearSession();
        var msg = (r.data && (r.data.message || r.data.code)) || ('Request failed (' + r.status + ')');
        var err = new Error(msg);
        err.status = r.status; err.code = r.data && r.data.code;
        throw err;
      }
      return r.data;
    });
  }

  // Soft call — returns mock fallback if the endpoint errors / 404s / offline.
  // `mockFn` is only invoked on failure, so it stays lazy.
  function softGet(path, mockFn) {
    if (FORCE_MOCK) return Promise.resolve(mockFn());
    return raw(path).then(function (r) {
      if (r.ok && r.data != null) return r.data;
      if (r.status === 401) clearSession();
      return mockFn();
    });
  }

  // ── Auth guard ───────────────────────────────────────────────
  function requireAuth() {
    if (FORCE_MOCK) return true; // demo mode — explore without a live session
    if (!getToken()) {
      var next = encodeURIComponent(location.pathname + location.hash);
      location.replace(SIGNUP_URL + '?next=' + next);
      return false;
    }
    return true;
  }

  // ── Endpoints ────────────────────────────────────────────────
  // /me is real (blockshare-api v0.1). Refreshes the cached user + notifies.
  function me() {
    return softGet('/me', function () { return MOCKS.me(); }).then(function (u) {
      _user = u; setSession(null, u); return u;
    });
  }
  function items(query) {
    var qs = query ? ('?' + new URLSearchParams(query).toString()) : '';
    return softGet('/items' + qs, function () { return MOCKS.items(query); });
  }
  function item(id) {
    return softGet('/items/' + id, function () { return MOCKS.item(id); });
  }
  // First real write. Falls back to an optimistic mock so the flow is
  // demoable before the endpoint exists.
  function borrow(id, body) {
    if (FORCE_MOCK) return Promise.resolve(MOCKS.borrow(id, body));
    return raw('/items/' + id + '/borrow', { method: 'POST', body: body || {} }).then(function (r) {
      if (r.ok && r.data) return r.data;
      if (r.status === 401) { clearSession(); throw new Error('Please sign in again.'); }
      if (r.status === 0 || r.status === 404) return MOCKS.borrow(id, body); // not built yet
      throw new Error((r.data && r.data.message) || 'Could not complete the request.');
    });
  }
  function foodSubscription() {
    return softGet('/food/subscription', function () { return MOCKS.food(); });
  }
  function activeVote() {
    return softGet('/votes/active', function () { return MOCKS.vote(); });
  }
  function broadcasts() {
    return softGet('/broadcasts', function () { return MOCKS.broadcasts(); });
  }
  function residents() {
    return softGet('/host/residents', function () { return MOCKS.residents(); });
  }
  function signOut() {
    raw('/auth/sign-out', { method: 'POST' });
    clearSession();
    location.href = SIGNUP_URL;
  }

  // ── Helpers exposed to screens ───────────────────────────────
  function isLive() { return !FORCE_MOCK; }
  function apiBase() { return API_BASE; }

  window.BS = {
    // session
    getToken: getToken, setSession: setSession, clearSession: clearSession,
    getUser: function () { return _user; }, subscribe: subscribe,
    requireAuth: requireAuth, signOut: signOut,
    // raw
    api: api, raw: raw, apiBase: apiBase, isLive: isLive, forceMock: FORCE_MOCK,
    // endpoints
    me: me, items: items, item: item, borrow: borrow,
    foodSubscription: foodSubscription, activeVote: activeVote,
    broadcasts: broadcasts, residents: residents,
  };

  /* =========================================================================
     MOCK DATA — adapted from the Expo app's mocks/data.ts.
     Used ONLY as a fallback when an endpoint is missing or ?mocks=1.
     Keep shapes aligned with what the PHP endpoints will return.
     ========================================================================= */
  var MOCKS = {
    me: function () {
      var cached = getCachedUser();
      return Object.assign({
        id: 1,
        display_name: (cached && cached.display_name) || 'Neighbour',
        phone_masked: (cached && cached.phone_masked) || '+1•••••••00',
        building_code: (cached && cached.building_code) || 'COMM-1234',
        building_name: 'The Gardens',
        roles: ['subscriber'],
        is_host: false,

<script type="text/babel">
/* ===========================================================================
   App shell — the spine that ties everything together.
     • Auth guard: no token → bounce to sign-up.
     • Bootstrap: load the real /me once, share it to every screen.
     • Hash router: #/home, #/stuff, #/food, #/me + sub-routes.
     • Tab bar: the 4 primary destinations, hidden on sub-screens.
   =========================================================================== */

const TABS = [
  { key: 'home',  label: 'Home',  icon: 'home',    route: '#/home' },
  { key: 'stuff', label: 'Stuff', icon: 'package', route: '#/stuff' },
  { key: 'food',  label: 'Food',  icon: 'food',    route: '#/food' },
  { key: 'me',    label: 'Me',    icon: 'user',    route: '#/me' },
];

/* Parse the hash into { name, params }. */
function parseRoute(hash) {
  const path = (hash || '').replace(/^#\/?/, '');
  const seg = path.split('/').filter(Boolean);
  if (seg.length === 0) return { name: 'home', params: {} };
  const [a, b, c] = seg;
  switch (a) {
    case 'home': case 'stuff': case 'food': case 'me': return { name: a, params: {} };
    case 'item': return { name: 'item', params: { id: b } };
    case 'vote': return { name: 'vote', params: { id: b } };
    case 'chat': return { name: 'chat', params: { id: b } };
    case 'list': return { name: 'list', params: {} };
    case 'host': return { name: 'host:' + (b || 'home'), params: { sub: b, id: c } };
    case 'food': return { name: 'food', params: {} };
    default: return { name: a, params: { sub: b, id: c } };
  }
}

function useHashRoute() {
  const [route, setRoute] = useState(() => parseRoute(location.hash));
  useEffect(() => {
    const on = () => { setRoute(parseRoute(location.hash)); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', on);
    return () => window.removeEventListener('hashchange', on);
  }, []);
  return route;
}

function navigate(hash) {
  if (location.hash === hash) return;
  location.hash = hash;
}

function App() {
  // Guard before anything renders.
  if (!BS.requireAuth()) return null;

  const route = useHashRoute();
  const [user, setUser] = useState(BS.getUser());
  const [bootErr, setBootErr] = useState(null);

  // Bootstrap /me once, then keep in sync with the store.
  useEffect(() => {
    const unsub = BS.subscribe(setUser);
    BS.me().then(setUser).catch((e) => {
      // /me 401 already clears the session + the guard will bounce on next tick.
      if (!BS.getToken()) BS.requireAuth();
      else setBootErr(e.message || 'Could not load your profile.');
    });
    return unsub;
  }, []);

  // Default route → home.
  useEffect(() => { if (!location.hash) location.replace('#/home'); }, []);

  if (bootErr) {
    return h('div', { className: 'bs-screen' },
      h(EmptyState, { icon: 'shield', title: 'Connection trouble', body: bootErr,
        action: h('button', { className: 'bs-btn bs-btn-primary bs-btn-md', onClick: () => location.reload() }, 'Try again') }));
  }

  const activeTab = ['home', 'stuff', 'food', 'me'].indexOf(route.name) >= 0 ? route.name : null;
  const screen = renderScreen(route, user);

  return h(React.Fragment, null,
    screen,
    activeTab && h(TabBar, { active: activeTab }));
}

function renderScreen(route, user) {
  switch (route.name) {
    case 'home':  return h(HomeScreen,  { user, navigate });
    case 'stuff': return h(StuffScreen, { navigate });
    case 'food':  return h(FoodScreen,  { navigate });
    case 'me':    return h(MeScreen,    { user, navigate });
    case 'item':  return h(ItemDetailScreen, { id: route.params.id, navigate });

    // Sub-flows — designed, awaiting their endpoints. Resolve to a real stub.
    case 'vote':  return h(StubScreen, { title: 'Ranked-choice vote', body: 'Cast and rank your choices here. Wires to GET/POST /votes/:id.', navigate });
    case 'chat':  return h(StubScreen, { title: 'Messages', body: 'Direct messages with the item owner. Wires to the chat endpoint (poll or Pusher).', navigate });
    case 'list':  return h(StubScreen, { title: 'Share an item', body: 'List something for your block to borrow. Wires to POST /items + media upload.', navigate });
    case 'host:residents': return h(StubScreen, { title: 'Building residents', body: 'Wires to GET /host/residents (Ultimate Member group members).', navigate });
    case 'host:broadcast': return h(StubScreen, { title: 'Send an announcement', body: 'Wires to POST /broadcasts → MailPoet + in-app.', navigate });
    case 'host:training':  return h(StubScreen, { title: 'Host training', body: 'Training modules for new Block Hosts.', navigate });
    case 'host:apply':     return h(StubScreen, { title: 'Become a Block Host', body: 'Wires to POST /host/applications.', navigate });
    default: return h(StubScreen, { title: 'Coming soon', navigate });
  }
}

function TabBar({ active }) {
  return h('nav', { className: 'bs-tabbar' },
    TABS.map((t) => h('button', {
      key: t.key, className: 'bs-tab' + (active === t.key ? ' on' : ''),
      onClick: () => navigate(t.route),
    },
      h(Icon, { name: t.icon, size: 23, stroke: active === t.key ? 2.4 : 2 }),
      h('span', null, t.label))));
}

// sheet keyframe (added here so it ships with the shell)
const _bsSheetStyle = document.createElement('style');
_bsSheetStyle.textContent = '@keyframes bs-sheet { from { transform: translateY(100%); } to { transform: none; } }';
document.head.appendChild(_bsSheetStyle);

ReactDOM.createRoot(document.getElementById('bs-root')).render(h(App));
</script>

</body>
</html>
